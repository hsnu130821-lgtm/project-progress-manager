<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目进度管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.header{background:white;padding:30px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:20px}.header h1{color:#2d3748;font-size:28px;margin-bottom:10px}.header p{color:#718096;font-size:14px}.upload-section{background:white;padding:30px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:20px}.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:20px}.upload-card{border:2px dashed #e2e8f0;border-radius:8px;padding:30px;text-align:center;transition:all .3s;cursor:pointer}.upload-card:hover{border-color:#667eea;background:#f7fafc}.upload-card.has-file{border-color:#48bb78;background:#f0fff4;border-style:solid}.upload-icon{font-size:48px;margin-bottom:15px}.upload-title{font-weight:600;color:#2d3748;margin-bottom:8px}.upload-desc{color:#718096;font-size:13px}.file-input{display:none}.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:20px}.team-card{background:white;border-radius:12px;padding:25px;box-shadow:0 4px 6px rgba(0,0,0,.1)}.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #e2e8f0}.team-name{font-size:20px;font-weight:700;color:#2d3748}.team-stats{display:flex;gap:15px}.stat-badge{background:#edf2f7;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#4a5568}.episode-list{display:flex;flex-direction:column;gap:15px}.episode-item{background:#f7fafc;border-radius:8px;padding:15px;transition:all .3s}.episode-item:hover{background:#edf2f7;transform:translateX(5px)}.episode-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.episode-title{font-weight:600;color:#2d3748;font-size:16px}.episode-percentage{font-weight:700;color:#667eea;font-size:18px}.progress-bar-container{width:100%;height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden;margin-bottom:10px}.progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:6px;transition:width .5s;position:relative}.progress-bar::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}.episode-details{display:flex;justify-content:space-between;font-size:12px;color:#718096}.status-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}.status-待分配{background:#e2e8f0;color:#4a5568}.status-制作中{background:#bee3f8;color:#2b6cb0}.status-审核中{background:#fef5e7;color:#c05621}.status-修改中{background:#fed7d7;color:#c53030}.status-已完成{background:#c6f6d5;color:#276749}.status-已归档{background:#e9d8fd;color:#6b46c1}.prediction-box{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;border-radius:8px;margin-top:15px}.prediction-title{font-size:14px;opacity:.9;margin-bottom:8px}.prediction-time{font-size:24px;font-weight:700}.cost-section{background:white;border-radius:12px;padding:25px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:20px}.section-title{font-size:20px;font-weight:700;color:#2d3748;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #e2e8f0}.cost-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}.cost-card{background:#f7fafc;padding:20px;border-radius:8px;border-left:4px solid #667eea}.cost-label{font-size:13px;color:#718096;margin-bottom:8px}.cost-value{font-size:24px;font-weight:700;color:#2d3748}.cost-detail{font-size:12px;color:#4a5568;margin-top:5px}.hidden{display:none}.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:15px}.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(102,126,234,.4)}.btn-secondary{background:#e2e8f0;color:#4a5568}.btn-secondary:hover{background:#cbd5e0}.alert{padding:15px;border-radius:8px;margin-bottom:15px}.alert-success{background:#c6f6d5;color:#276749;border:1px solid #9ae6b4}.alert-error{background:#fed7d7;color:#c53030;border:1px solid #feb2b2}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🎬 项目进度管理系统</h1><p>面向制片人/项目管理者的可视化看板</p></div>
        <div class="upload-section">
            <h2 style="font-size:20px;color:#2d3748;margin-bottom:10px">📤 数据导入</h2>
            <p style="color:#718096;font-size:14px">上传 CSV 文件自动分析</p>
            <div class="upload-grid">
                <div class="upload-card" id="progressUploadCard" onclick="document.getElementById('progressInput').click()">
                    <div class="upload-icon">📊</div><div class="upload-title">项目进度表</div>
                    <div class="upload-desc" id="progressDesc">点击上传 CSV</div>
                    <input type="file" id="progressInput" class="file-input" accept=".csv" onchange="handleProgressUpload(event)">
                </div>
                <div class="upload-card" id="salaryUploadCard" onclick="document.getElementById('salaryInput').click()">
                    <div class="upload-icon">💰</div><div class="upload-title">薪资数据表</div>
                    <div class="upload-desc" id="salaryDesc">点击上传 CSV</div>
                    <input type="file" id="salaryInput" class="file-input" accept=".csv" onchange="handleSalaryUpload(event)">
                </div>
            </div>
        </div>
        <div id="dashboard" class="dashboard hidden"></div>
        <div id="costSection" class="cost-section hidden"><h3 class="section-title">💵 成本分析</h3><div class="cost-grid" id="costGrid"></div></div>
        <div id="actionButtons" class="hidden" style="text-align:center;margin-top:30px">
            <button class="btn btn-secondary" onclick="exportReport()">📥 导出报告</button>
            <button class="btn" onclick="refreshData()">🔄 刷新</button>
        </div>
    </div>
    <script>
        let progressData=[],salaryData=[],teams={};const STATUS_CONFIG={'待分配':{weight:0},'制作中':{weight:.25},'审核中':{weight:.5},'修改中':{weight:.5},'已完成':{weight:1},'已归档':{weight:1}};function parseCSV(t){const lines=t.trim().split('\n');if(lines.length===0)return[];const headers=lines[0].split(',').map(h=>h.trim());const result=[];for(let i=1;i<lines.length;i++){const values=lines[i].split(',').map(v=>v.trim());const row={};headers.forEach((h,idx)=>{row[h]=values[idx]||''});result.push(row)}return result}function handleProgressUpload(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const data=parseCSV(e.target.result);if(data.length===0)throw new Error('CSV 为空');progressData=data;processData();document.getElementById('progressUploadCard').classList.add('has-file');document.getElementById('progressDesc').textContent=`✓ 已加载 (${data.length}条)`;showAlert('加载成功','success')}catch(err){showAlert('失败：'+err.message,'error')}};reader.readAsText(file)}function handleSalaryUpload(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{const data=parseCSV(e.target.result);salaryData=data;if(progressData.length>0)calculateCosts();document.getElementById('salaryUploadCard').classList.add('has-file');document.getElementById('salaryDesc').textContent=`✓ 已加载 (${data.length}条)`;showAlert('加载成功','success')}catch(err){showAlert('失败：'+err.message,'error')}};reader.readAsText(file)}function processData(){teams={};progressData.forEach(row=>{const team=row['制作组']||'未分组';const ep=row['集数']||'未知';const stage=row['环节名称']||'未知';const status=row['状态']||'待分配';if(!teams[team])teams[team]={};if(!teams[team][ep])teams[team][ep]={stages:[],completed:0,total:0,percentage:0,editingProgress:0,predicted:null};teams[team][ep].stages.push({name:stage,status});teams[team][ep].total++;if(status==='已完成'||status==='已归档')teams[team][ep].completed++;if(stage.includes('剪辑'))teams[team][ep].editingProgress=STATUS_CONFIG[status].weight*100});Object.keys(teams).forEach(t=>{Object.keys(teams[t]).forEach(e=>{const d=teams[t][e];d.percentage=d.total>0?Math.round(d.completed/d.total*100):0;d.predicted=predict(d)})});renderDashboard();salaryData.length>0&&calculateCosts()}function predict(d){if(d.editingProgress>=100)return'已完成';if(d.editingProgress===0)return'尚未开始';const days=Math.round((100-d.editingProgress)*30/d.editingProgress);const date=new Date();date.setDate(date.getDate()+days);return`${date.getMonth()+1}月${date.getDate()}日`}function renderDashboard(){const el=document.getElementById('dashboard');el.innerHTML='';Object.keys(teams).forEach(team=>{const eps=teams[team];const count=Object.keys(eps).length;const avg=Math.round(Object.values(eps).reduce((s,d)=>s+d.percentage,0)/count);const card=document.createElement('div');card.className='team-card';card.innerHTML=`<div class="team-header"><div class="team-name">${team}</div><div class="team-stats"><span class="stat-badge">${count}集</span><span class="stat-badge">平均${avg}%</span></div></div><div class="episode-list">${Object.entries(eps).map(([n,d])=>`<div class="episode-item"><div class="episode-header"><div class="episode-title">${n}</div><div class="episode-percentage">${d.percentage}%</div></div><div class="progress-bar-container"><div class="progress-bar" style="width:${d.percentage}%"></div></div><div class="episode-details"><span>环节：${d.stages.length}</span><span class="status-badge status-${d.stages[d.stages.length-1]?.status||'待分配'}">${d.stages[d.stages.length-1]?.status||'待分配'}</span></div>${d.predicted?`<div class="prediction-box"><div class="prediction-title">⏱️ 预计完成</div><div class="prediction-time">${d.predicted}</div></div>`:''}</div>`).join('')}</div>`;el.appendChild(card)});el.classList.remove('hidden');document.getElementById('actionButtons').classList.remove('hidden')}function calculateCosts(){if(!salaryData.length||!progressData.length)return;const grid=document.getElementById('costGrid');grid.innerHTML='';const map={};salaryData.forEach(p=>{const n=p['姓名'];const s=parseFloat(p['月薪']||0);if(n&&s)map[n]=s});const costs={};progressData.forEach(r=>{const ep=r['集数'];const owner=r['负责人'];if(!costs[ep])costs[ep]=0;if(owner&&map[owner])costs[ep]+=map[owner]/21.75});const total=Object.values(costs).reduce((a,b)=>a+b,0);const avg=total/Object.keys(costs).length;grid.innerHTML=`<div class="cost-card"><div class="cost-label">总成本</div><div class="cost-value">¥${Math.round(total).toLocaleString()}</div></div><div class="cost-card"><div class="cost-label">单集平均</div><div class="cost-value">¥${Math.round(avg).toLocaleString()}</div></div>`;document.getElementById('costSection').classList.remove('hidden')}function showAlert(msg,type){document.querySelectorAll('.alert').forEach(e=>e.remove());const div=document.createElement('div');div.className=`alert alert-${type}`;div.textContent=msg;div.style.marginTop='15px';document.querySelector('.upload-section').appendChild(div);setTimeout(()=>div.remove(),3000)}function exportReport(){const data=[];Object.keys(teams).forEach(t=>{Object.keys(teams[t]).forEach(e=>{const d=teams[t][e];data.push({制作组:t,集数:e,完成度:d.percentage+'%'})})});const h=Object.keys(data[0]);const lines=[h.join(',')];data.forEach(r=>lines.push(h.map(k=>r[k]).join(',')));const blob=new Blob([lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='report.csv';a.click();showAlert('导出成功','success')}function refreshData(){progressData.length>0&&processData();showAlert('已刷新','success')}
    </script>
</body>
</html>
